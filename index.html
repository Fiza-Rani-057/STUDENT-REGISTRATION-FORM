<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form_div">
     <h1 class="main_heading">STUDENT REGISTRATION FORM</h1>
    <form class="form">
        <label for="std_name" id="name">Name*</label> <br>
        <input type="text" name="std_name" id="std_name"> <br>

        <label for="ft_name" id="ftname">Father Name*</label> <br>
        <input type="text" name="ft_name" id="ft_name"> <br>

        <label for="std_email" id="E-mail">E-mail*</label> <br>
        <input type="email" name="std_email" id="std_email"> <br>

        <label for="std_course" id="Course">Course* <br>
        <select name="select_course" id="select_course">

            <option value="Web">Web development</option>
            <option value="Graphic">Graphic Designing</option>
            <option value="App">Mobile App Development</option>
            <option value="CDE">Cloud Data Engeenering</option>
            <option value="DS">AI & Data Science</option>

        </select> 
        </label> <br>

        <button type="submit" id="btn1">Register</button>
        <button type="reset" id="btn2">Reset</button>
    </form>
    </div>
    <div class="div"></div>

    <script src="script.js"></script>
</body>

</html>
