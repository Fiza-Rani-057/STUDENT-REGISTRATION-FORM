<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
     <h1 class="main_heading">STUDENT REGISTRATION FORM</h1>
    <form>
        <label for="std_name">Name*</label> <br>
        <input type="text" name="std_name" id="std_name"> <br>

        <label for="ft_name">Father Name*</label> <br>
        <input type="text" name="ft_name" id="ft_name"> <br>

        <label for="std_eamil">E-mail*</label> <br>
        <input type="email" name="std_eamil" id="std_eamil"> <br>

        <label for="std_course">Course*</label> <br>
        <input type="text" name="std_course" id="std_course"> <br>
        <select name="select_course" id="select_course">

            <option value="Web">Web development</option>
            <option value="Graphic">Graphic Designing</option>
            <option value="App">Mobile App Development</option>
            <option value="CDE">Cloud Data Engeenering</option>
            <option value="DS">AI & Data Science</option>

        </select> <br>

        <button type="submit" id="btn1">Register</button> <br>
        <button type="reset" id="btn2">Reset</button>
    </form>

    <script src="script.js"></script>
</body>

</html>
